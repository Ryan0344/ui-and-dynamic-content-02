<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List Widget</title>

    <link rel="stylesheet" href="css/styles.css">

    <!-- Font Awsome for icons-->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- Masterhead -->
    <header class="masterhead">

        <!-- Shopping cart image -->
        <img src="img/imgOne.png" alt="shopping cart">

            <!-- Main Heading for shopping list -->
            <h1>My Shopping List</h1>

        <!-- Tagline -->    
        <p class="tagline">Shop Organized</p>

    </header>
    
    <!-- Widget container that holds the shopping list -->

    <main class="widget">

        <!-- section for the shopping list items -->
        <section class="input-area">

            <!-- Text feild where user adds shopping list -->
            <input type="text" placeholder="Enter an item">

            <!-- Button triggers JS to add items to the list -->
            <button>ADD ITEM</button>

        </section>

        <!-- Area the feedback appears if need be -->
        <p class="feedback"></p>

        <!-- Unordered list where JS inserts the items into a list -->
        <ul class="item-list"></ul>

    </main>

    <!-- Footer with three social media links & icons -->
    <footer>

        <!-- Font Awsome Icons -->
         
        <!-- Facebook Font Awesome icon -->
        <a href="#"><i class="fab fa-facebook"></i></a>

        <!-- Instagram Font Awesome icon -->
        <a href="#"><i class="fab fa-instagram"></i></a>

        <!-- X(Twitter) Font Awesome icon -->
        <a href="#"><i class="fab fa-x-twitter"></i></a>

    </footer>

    <script src="js/script.js"></script>
</body>
</html>
